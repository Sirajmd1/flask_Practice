name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main
      - staging

jobs:
  build-test:
    name: Install Dependencies, Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flask pytest
          fi

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/
          else
            echo "No tests directory found. Running syntax validation."
            python -m compileall .
          fi

      - name: Build application
        run: |
          echo "Build completed successfully."
          mkdir -p build
          cp -r . build/

  deploy-staging:
    name: Deploy to Staging
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying Flask application to staging environment..."
          echo "Using staging host: ${{ secrets.STAGING_HOST }}"
          echo "Staging deployment completed successfully."

  deploy-production:
    name: Deploy to Production
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying Flask application to production environment..."
          echo "Using production host: ${{ secrets.PRODUCTION_HOST }}"
          echo "Production deployment completed successfully."
